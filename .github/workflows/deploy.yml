name: Build and deploy frontend

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho
  SERVICE_NAME: frontend

jobs:
  build-push-deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_VENTAS=/api/v1/ventas
            VITE_API_DESPACHOS=/api/v1/despachos
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy service on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FRONT_EC2_HOST }}
          username: ${{ secrets.FRONT_EC2_USER }}
          key: ${{ secrets.FRONT_EC2_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.FRONT_EC2_DEPLOY_PATH }}"
            docker compose pull ${{ env.SERVICE_NAME }}
            docker compose up -d --no-deps ${{ env.SERVICE_NAME }}
            docker image prune -f
